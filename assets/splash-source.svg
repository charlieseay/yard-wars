<?xml version="1.0" encoding="UTF-8"?>
<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <!-- iPhone splash screen dimensions (iPhone 13 Pro Max) -->
  <!-- True black background -->
  <rect width="1284" height="2778" fill="#000000"/>

  <!-- Centered logo group -->
  <g id="splash-logo" transform="translate(642, 1200)">
    <!-- Bourbon glass (larger) -->
    <g id="glass" transform="scale(1.5)">
      <path d="M -80 100 L -60 -100 L 60 -100 L 80 100 Z"
            fill="none"
            stroke="#FF8C00"
            stroke-width="10"/>
      <path d="M -75 40 L -57 -80 L 57 -80 L 75 40 Z"
            fill="#FF8C00"
            opacity="0.3"/>
      <rect x="-40" y="-40" width="30" height="30"
            fill="#00FFFF"
            opacity="0.4"/>
      <rect x="15" y="-20" width="25" height="25"
            fill="#00FFFF"
            opacity="0.4"/>
    </g>

    <!-- Disc (larger) -->
    <g id="disc" transform="translate(0, 280) scale(1.5)">
      <circle cx="0" cy="0" r="120"
              fill="none"
              stroke="#00FF00"
              stroke-width="10"/>
      <circle cx="0" cy="0" r="90"
              fill="none"
              stroke="#00FF00"
              stroke-width="6"
              opacity="0.6"/>
      <circle cx="0" cy="0" r="50"
              fill="#00FF00"
              opacity="0.2"/>
      <circle cx="0" cy="0" r="20"
              fill="#00FF00"
              opacity="0.4"/>
    </g>
  </g>

  <!-- App title -->
  <text x="642" y="1850"
        font-family="Arial Black, sans-serif"
        font-size="120"
        font-weight="bold"
        fill="#FFFFFF"
        text-anchor="middle">
    BIRDIES &amp; BOURBON
  </text>

  <!-- Tagline -->
  <text x="642" y="1950"
        font-family="Arial, sans-serif"
        font-size="48"
        fill="#00FFFF"
        text-anchor="middle">
    Disc Golf Side Games
  </text>

  <!-- Animated dots (loading indicator - static in SVG) -->
  <g id="loading" transform="translate(642, 2100)">
    <circle cx="-60" cy="0" r="15" fill="#00FF00" opacity="0.8"/>
    <circle cx="0" cy="0" r="15" fill="#00FF00" opacity="0.5"/>
    <circle cx="60" cy="0" r="15" fill="#00FF00" opacity="0.3"/>
  </g>

  <!-- Version/tagline at bottom -->
  <text x="642" y="2600"
        font-family="Arial, sans-serif"
        font-size="32"
        fill="#666666"
        text-anchor="middle">
    Offline-First • OLED Optimized
  </text>
</svg>
